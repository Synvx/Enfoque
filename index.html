<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Panel de Enfoque</title>
    <meta
      name="description"
      content="Un panel de productividad simple y premium con reloj, temporizador y tareas."
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0d0f1a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
      <div class="color-themes">
        <button class="color-btn" data-color="#4ecca3" style="background: #4ecca3;" title="Néon"></button>
        <button class="color-btn" data-color="#ff7b54" style="background: #ff7b54;" title="Naranja"></button>
        <button class="color-btn" data-color="#9d4edd" style="background: #9d4edd;" title="Púrpura"></button>
        <button class="color-btn" data-color="#3a86ff" style="background: #3a86ff;" title="Azul"></button>
      </div>
      <div class="nav-controls">
        <button id="theme-btn" class="btn icon" aria-label="Cambiar Tema" title="Tema Claro/Oscuro">
          <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button id="focus-mode-btn" class="btn icon" aria-label="Modo Concentración" title="Modo Concentración Completa">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3" />
          </svg>
        </button>
      </div>
    </nav>

    <div class="dashboard-container">
      <button id="exit-focus-btn" class="exit-focus-btn" aria-label="Salir del modo concentración" title="Salir (ESC)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      <header class="greeting-section">
        <h1 id="greeting">Hola <span id="user-level-badge" class="level-badge">Lvl 1</span></h1>
        <p id="motivational-quote" class="quote-text"></p>
        <div id="clock" class="clock">00:00</div>
        <div id="daily-stats" class="daily-stats" title="Ver Historial" style="cursor: pointer;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <span id="stats-count">Ciclos hoy: 0</span>
        </div>
      </header>

      <main class="widgets">
        <!-- Focus Timer Widget -->
        <section class="widget timer-widget">
          <h2>Temporizador</h2>
          <div class="timer-input-group">
            <input type="text" id="timer-task-input" class="timer-task-input" placeholder="¿Qué vas a hacer? (ej. Leer)" />
            <button id="timer-task-btn" class="btn primary">OK</button>
          </div>
          <div class="timer-mode-group">
            <div id="timer-mode" class="timer-mode">Estudio</div>
            <div id="timer-loops" class="timer-loops" style="display: none;">Ciclo: 1/4</div>
          </div>
          <div class="timer-circle-wrap">
            <svg class="progress-ring" width="250" height="250">
              <circle class="progress-ring-track" stroke-width="10" fill="transparent" r="115" cx="125" cy="125" />
              <circle id="progress-ring-bar" class="progress-ring-bar" stroke-width="10" fill="transparent" r="115" cx="125" cy="125" />
            </svg>
            <div class="timer-display" id="timer-display">30:00</div>
          </div>
          <div class="timer-controls">
            <button id="start-btn" class="btn primary">Iniciar</button>
            <button id="pause-btn" class="btn secondary">Pausar</button>
            <button id="reset-btn" class="btn icon" aria-label="Reiniciar">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <path d="M3 3v5h5" />
              </svg>
            </button>
          </div>
          <div class="timer-settings">
            <div class="setting-group">
              <label for="study-time-input">Estudio (min):</label>
              <input type="number" id="study-time-input" min="1" max="120" value="30" class="time-input" />
            </div>
            <div class="setting-group">
              <label for="rest-time-input">Descanso (min):</label>
              <input type="number" id="rest-time-input" min="1" max="60" value="10" class="time-input" />
            </div>
            <div class="setting-group">
              <label for="loops-input">Repeticiones:</label>
              <input type="number" id="loops-input" min="1" max="20" value="4" class="time-input" />
            </div>
          </div>
        </section>

        <!-- Todo Widget -->
        <section class="widget todo-widget">
          <h2>Tareas</h2>
          <div class="todo-input-group">
            <select id="todo-tag" class="todo-tag-select" title="Etiqueta">
              <option value="none" data-color="var(--text-secondary)">--</option>
              <option value="estudio" data-color="#00bbf9">Estudio</option>
              <option value="trabajo" data-color="#fbbc04">Trabajo</option>
              <option value="personal" data-color="#2b9348">Personal</option>
            </select>
            <input
              type="text"
              id="todo-input"
              placeholder="¿Qué necesitas hacer?"
            />
            <button id="add-todo-btn" class="btn primary">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
            </button>
          </div>
          <ul id="todo-list" class="todo-list">
            <!-- Tasks will be injected here -->
          </ul>
        </section>

        <!-- Audio/Ambient Widget -->
        <section class="widget audio-widget" style="grid-column: 1 / -1; display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 1rem; padding: 1.5rem;">
          <h2 style="margin: 0; font-size: 1.2rem;">Lofi Radio</h2>
          <div class="audio-controls" style="display: flex; gap: 1rem; align-items: center; margin-top: 0;">
            <input type="range" id="bg-volume-slider" class="volume-slider" min="0" max="1" step="0.05" value="0.5" title="Volumen de sonido">
            <button id="bg-audio-btn" class="btn icon audio-toggle" aria-label="Audio de fondo" title="Música para Concentrar">
              <svg id="audio-icon-off" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
              <svg id="audio-icon-on" style="display: none;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            </button>
          </div>
        </section>

        <!-- Backup Widget -->
        <section class="widget backup-widget" style="grid-column: 1 / -1; display: flex; flex-direction: row; justify-content: center; align-items: center; padding: 1rem; gap: 1rem;">
           <span style="color: var(--text-secondary); font-size: 0.9rem;">Backup y Sincronización:</span>
           <button id="export-data-btn" class="btn secondary" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">Exportar</button>
           <button id="import-data-btn" class="btn secondary" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">Importar</button>
           <input type="file" id="import-file-input" accept=".json" style="display: none;" />
        </section>
      </main>
    </div>

    <!-- Audio Elements -->
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <audio id="bg-sound" src="https://streams.fluxfm.de/Chillhop/mp3-128/streams.fluxfm.de/" preload="auto"></audio>
    
    <!-- Custom Toast Notification -->
    <div id="toast-container" class="toast-container hidden">
      <div class="toast-content" id="toast-message">Notificación de prueba</div>
      <button class="toast-close" id="toast-close">&times;</button>
    </div>

    <!-- Stats Modal (Chart) (Legacy) -->
    <div id="stats-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Productividad Semanal</h2>
          <button id="close-stats-btn" class="btn icon">&times;</button>
        </div>
        <div class="modal-body">
          <div class="chart-container" id="chart-container">
            <!-- Bars injected via JS -->
          </div>
        </div>
      </div>
    </div>

    <!-- Analytics Modal (Advanced) -->
    <div id="analytics-modal" class="modal-overlay hidden">
      <div class="modal-content analytics-modal-content">
        <div class="modal-header">
          <h2>Tus Estadísticas Avanzadas</h2>
          <button id="close-analytics-btn" class="btn icon">&times;</button>
        </div>
        <div class="modal-body">
          <div class="analytics-summary-grid">
            <div class="analytics-card">
              <h3 class="stat-title">Día Más Productivo</h3>
              <p id="stat-best-day" class="stat-value">-</p>
            </div>
            <div class="analytics-card">
              <h3 class="stat-title">Tiempo Enfocado</h3>
              <p id="stat-total-hours" class="stat-value">0h 0m</p>
            </div>
          </div>
  
          <div class="heatmap-section">
            <h3 style="color: var(--text-secondary); margin-bottom: 1rem; font-size: 1rem;">Historial (Últimos 30 días)</h3>
            <div id="heatmap-grid" class="heatmap"></div>
            <div class="heatmap-legend">
              <span>Menos</span>
              <div class="heat-box heat-level-0"></div>
              <div class="heat-box heat-level-1"></div>
              <div class="heat-box heat-level-2"></div>
              <div class="heat-box heat-level-3"></div>
              <div class="heat-box heat-level-4"></div>
              <span>Más</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker registrado!', reg))
            .catch(err => console.log('Error registrando Service Worker', err));
        });
      }
    </script>
  </body>
</html>
